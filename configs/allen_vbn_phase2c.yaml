data:
  root: data/allen/visual-behavior-neuropixels-0.5.0
  regions: [VISp, VISl, VISal, VISrl, VISpm, VISam]
  min_units_per_region: 20
target:
  start_seconds: -0.25
  stop_seconds: 0.75
  bin_size_seconds: 0.05
  candidates: [baseline_subtracted, region_peak_normalized, temporal_derivative]
analysis:
  permutations: 1000
  bootstrap_samples: 5000
  seed: 20260615
  thresholds:
    median_cross_mouse_correlation_gt: 0.5
    median_split_half_correlation_gt: 0.7
    fraction_above_null_95_gte: 0.5
    bootstrap_lower_bound_gt: 0.0
confirmation:
  sessions: 20
  familiar_sessions: 10
  novel_sessions: 10
  minimum_successful_sessions: 16
  sealed_plan: configs/allen_vbn_phase2c_confirmation_sealed.json
output:
  root: outputs
  development_name: allen-vbn-phase2c-development
  confirmation_name: allen-vbn-phase2c-confirmation
